# SonarQube Project Configuration

# Project identification
sonar.projectKey=fullstack-app
sonar.projectName=Full Stack Application
sonar.projectVersion=1.0

# Source code location
sonar.sources=frontend/src,backend

# Exclusions
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/venv/**,**/.venv/**,**/dist/**,**/build/**,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Test locations (optional)
sonar.tests=frontend/src,backend/tests
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/test_*.py

# Coverage reports (configure after setting up test coverage)
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
# sonar.python.coverage.reportPaths=backend/coverage.xml

# Language-specific settings
sonar.language=multi

# Source encoding
sonar.sourceEncoding=UTF-8

# Python specific
sonar.python.version=3.11

# JavaScript/TypeScript specific
sonar.javascript.node.maxspace=4096
